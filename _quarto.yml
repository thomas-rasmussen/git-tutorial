project:
  type: book
  output-dir: docs
  
toc-expand: 2
toc-depth: 4
page-navigation: true
book:
  title: "Git tutorial"
  sidebar:
    style: docked
    background: light
  search: true
  repo-url: https://github.com/thomas-rasmussen/git-tutorial
  chapters:
    - index.qmd
    - part: "Part I - Basic Git"
      chapters: 
        - introduction-to-git.qmd
    - part: "Part II - Branching and remotes"
    - part: "Part III - Stand-alone topics"
      chapters:
        - workflows.qmd
        - github.qmd
        - the-dot-git-folder.qmd
    
  appendices:
    - git-for-windows.qmd
    - graphical-user-interfaces.qmd
    - further-reading.qmd
    - references.qmd
  page-footer:
    background: dark
    border: true
    right:
      - icon: github
        href: https://github.com/thomas-rasmussen/git-tutorial

bibliography: references.bib
nocite: |
  @*
  
format:
  html:
    css: styles.css
    theme: minty



